<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>売上集計ツール - Site ID 末尾2桁別</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    --bg: #F7F6F2;
    --surface: #FFFFFF;
    --border: #E2E0D8;
    --text-primary: #2A2A28;
    --text-secondary: #6B6A63;
    --accent: #2E5B8F;
    --accent-dark: #1F4068;
    --success-bg: #E1F5EE;
    --success-text: #085041;
    --danger-bg: #FCEBEB;
    --danger-text: #791F1F;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    margin: 0;
    padding: 2rem 1rem;
    line-height: 1.6;
  }
  .container {
    max-width: 760px;
    margin: 0 auto;
  }
  h1 {
    font-size: 22px;
    font-weight: 600;
    margin: 0 0 0.25rem;
  }
  .subtitle {
    color: var(--text-secondary);
    font-size: 14px;
    margin: 0 0 2rem;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 1.25rem;
  }
  .card h2 {
    font-size: 15px;
    font-weight: 600;
    margin: 0 0 1rem;
    color: var(--text-primary);
  }
  .dropzone {
    border: 2px dashed var(--border);
    border-radius: 10px;
    padding: 2.5rem 1rem;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }
  .dropzone:hover, .dropzone.dragover {
    border-color: var(--accent);
    background: #F0F4F9;
  }
  .dropzone p {
    margin: 0.25rem 0;
    color: var(--text-secondary);
    font-size: 14px;
  }
  .dropzone .icon {
    font-size: 28px;
    margin-bottom: 0.5rem;
  }
  input[type="file"] { display: none; }
  .file-list {
    margin-top: 1rem;
  }
  .file-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.6rem 0.8rem;
    background: var(--bg);
    border-radius: 8px;
    margin-bottom: 0.5rem;
    font-size: 14px;
  }
  .file-item .name {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    margin-right: 0.5rem;
  }
  .file-item .remove {
    cursor: pointer;
    color: var(--text-secondary);
    border: none;
    background: none;
    font-size: 16px;
    padding: 0 0.3rem;
  }
  .file-item .remove:hover { color: var(--danger-text); }
  label.field-label {
    display: block;
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 0.35rem;
  }
  input[type="text"] {
    width: 100%;
    padding: 0.55rem 0.75rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    margin-bottom: 1rem;
    font-family: inherit;
  }
  input[type="text"]:focus {
    outline: none;
    border-color: var(--accent);
  }
  button.primary {
    width: 100%;
    padding: 0.75rem;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  button.primary:hover { background: var(--accent-dark); }
  button.primary:disabled {
    background: var(--border);
    color: var(--text-secondary);
    cursor: not-allowed;
  }
  .status {
    margin-top: 0.75rem;
    font-size: 13px;
    padding: 0.6rem 0.8rem;
    border-radius: 8px;
    display: none;
  }
  .status.success { display: block; background: var(--success-bg); color: var(--success-text); }
  .status.error { display: block; background: var(--danger-bg); color: var(--danger-text); }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    margin-top: 0.5rem;
  }
  th, td {
    text-align: left;
    padding: 0.5rem 0.6rem;
    border-bottom: 1px solid var(--border);
  }
  th { color: var(--text-secondary); font-weight: 500; }
  td.num { text-align: right; font-variant-numeric: tabular-nums; }
  tr.total td { font-weight: 600; border-top: 2px solid var(--border); border-bottom: none; }
  .result-actions {
    margin-top: 1rem;
    display: flex;
    gap: 0.5rem;
  }
  .result-actions button {
    flex: 1;
    padding: 0.6rem;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    font-size: 14px;
    cursor: pointer;
  }
  .result-actions button:hover { background: var(--bg); }
  .result-actions button.download {
    background: var(--accent);
    color: #fff;
    border: none;
  }
  .result-actions button.download:hover { background: var(--accent-dark); }
  .result-block {
    margin-bottom: 1.5rem;
  }
  .result-block:last-child { margin-bottom: 0; }
  .result-block h3 {
    font-size: 14px;
    font-weight: 600;
    margin: 0 0 0.5rem;
  }
  .hint {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 0.5rem;
  }
</style>
</head>
<body>
<div class="container">
  <h1>売上集計ツール</h1>
  <p class="subtitle">Site ID 末尾2桁ごとに売上を分けて集計します</p>

  <div class="card">
    <h2>1. Excelファイルをアップロード</h2>
    <div class="dropzone" id="dropzone">
      <div class="icon">📂</div>
      <p>クリックしてファイルを選択、またはドラッグ&ドロップ</p>
      <p style="font-size:12px;">複数ファイル可（決済額明細を含む.xlsxファイル）</p>
    </div>
    <input type="file" id="fileInput" accept=".xlsx,.xls" multiple>
    <div class="file-list" id="fileList"></div>
  </div>

  <div class="card">
    <h2>2. 集計期間（任意）</h2>
    <label class="field-label">期間ラベル（例: 2026年4月）</label>
    <input type="text" id="periodInput" placeholder="2026年4月">
  </div>

  <div class="card">
    <button class="primary" id="runBtn" disabled>集計する</button>
    <div class="status" id="status"></div>
  </div>

  <div class="card" id="resultsCard" style="display:none;">
    <h2>結果</h2>
    <div id="resultsContainer"></div>
  </div>
</div>

<script>
// Site ID → サイト名 対応表（事前登録）
const SITE_NAMES = {
  '76208801': 'リスタート',
  '76208802': 'High Cloud',
  '76208803': 'SHERPA',
  '76208804': 'L.LEAGUE',
  '76208805': 'ロト超新塾',
  '76208806': 'NEXT DOOR',
  '76208807': '金の虎',
  '76208808': 'Golden Support',
  '76208809': 'ホットライン',
  '76208810': 'シークレットベース',
  '76208811': 'ファミリア',
  '76208812': 'ImRich',
  '80790801': 'アーチスト',
  '80790802': 'ドラゴンゲート',
  '80790803': 'グランドスラム',
  '80790804': 'アルカナ',
  '80790805': '珠玉庵',
  '80790806': 'オリンポス',
  '80790807': 'フルスロットル',
  '80790808': 'Classic',
  '80790809': '豪運ロト',
  '80790810': 'LOTOstics',
  '80790811': 'LOTO技研',
  '80790812': 'ミリオンアカデミー',
  '80790813': 'LOTO TOKYO',
  '80790814': 'しあわせ荘',
  '76797601': '当せんファクトリー',
  '76797602': '当源郷',
  '76797603': 'WINNERS',
  '76797604': 'スカイゲート',
  '76797605': 'くじしるべの会'
};

const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('fileInput');
const fileList = document.getElementById('fileList');
const runBtn = document.getElementById('runBtn');
const statusEl = document.getElementById('status');
const resultsCard = document.getElementById('resultsCard');
const resultsContainer = document.getElementById('resultsContainer');
const periodInput = document.getElementById('periodInput');

let uploadedFiles = [];

dropzone.addEventListener('click', () => fileInput.click());
dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('dragover'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
dropzone.addEventListener('drop', (e) => {
  e.preventDefault();
  dropzone.classList.remove('dragover');
  addFiles(e.dataTransfer.files);
});
fileInput.addEventListener('change', (e) => addFiles(e.target.files));

function addFiles(fileListObj) {
  for (const f of fileListObj) {
    if (!uploadedFiles.some(uf => uf.name === f.name && uf.size === f.size)) {
      uploadedFiles.push(f);
    }
  }
  renderFileList();
}

function removeFile(idx) {
  uploadedFiles.splice(idx, 1);
  renderFileList();
}

function renderFileList() {
  fileList.innerHTML = '';
  uploadedFiles.forEach((f, idx) => {
    const div = document.createElement('div');
    div.className = 'file-item';
    div.innerHTML = `<span class="name">${f.name}</span><button class="remove" data-idx="${idx}">✕</button>`;
    fileList.appendChild(div);
  });
  fileList.querySelectorAll('.remove').forEach(btn => {
    btn.addEventListener('click', (e) => removeFile(parseInt(e.target.dataset.idx)));
  });
  runBtn.disabled = uploadedFiles.length === 0;
}

function showStatus(msg, type) {
  statusEl.textContent = msg;
  statusEl.className = 'status ' + type;
}

function readFileAsArrayBuffer(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => resolve(e.target.result);
    reader.onerror = reject;
    reader.readAsArrayBuffer(file);
  });
}

// 《決済額明細》セクションから「売上確定」の行を抽出
function parseSales(workbook) {
  const sheetName = workbook.SheetNames[0];
  const sheet = workbook.Sheets[sheetName];
  const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, raw: false, defval: '' });

  const records = [];
  let inSales = false;

  for (const row of rows) {
    const val = (row[0] !== undefined && row[0] !== null) ? String(row[0]).trim() : '';

    if (val === '《決済額明細》') {
      inSales = true;
      continue;
    }

    if (inSales && /^[0-9]/.test(val)) {
      const result = (row[7] !== undefined && row[7] !== null) ? String(row[7]).trim() : '';
      if (result === '売上確定') {
        const siteId = String(parseInt(val, 10));
        const amount = parseInt(String(row[8]).replace(/,/g, ''), 10) || 0;
        records.push({
          siteId: siteId,
          cardNo: row[2] !== undefined ? String(row[2]).trim() : '',
          transactionId: row[4] !== undefined ? String(row[4]).trim() : '',
          dayTime: row[6] !== undefined ? String(row[6]).trim() : '',
          result: result,
          amount: amount
        });
      }
    }

    if (inSales && (val.startsWith('《ﾁｬｰｼﾞ') || val.startsWith('《取消') || val.startsWith('《認証'))) {
      break;
    }
  }

  return records;
}

function summarizeByLast2(records) {
  const groups = {};
  for (const r of records) {
    const last2 = r.siteId.slice(-2);
    if (!groups[last2]) groups[last2] = [];
    groups[last2].push(r);
  }
  const digits = Object.keys(groups).sort();
  const summary = digits.map(d => {
    const items = groups[d];
    const count = items.length;
    const sum = items.reduce((acc, r) => acc + r.amount, 0);
    const siteId = items[0].siteId;
    const siteName = SITE_NAMES[siteId] || '';
    return { digit: d, siteId, siteName, count, sum, items };
  });
  return summary;
}

function formatYen(n) {
  return n.toLocaleString('ja-JP') + '円';
}

function renderResultTable(fileName, summary, totalCount, totalSum) {
  const block = document.createElement('div');
  block.className = 'result-block';

  let rowsHtml = summary.map(s => `
    <tr>
      <td>${s.digit}</td>
      <td>${s.siteId}</td>
      <td>${s.siteName || '—'}</td>
      <td class="num">${s.count}件</td>
      <td class="num">${formatYen(s.sum)}</td>
    </tr>
  `).join('');

  block.innerHTML = `
    <h3>${fileName}</h3>
    <table>
      <thead>
        <tr><th>末尾2桁</th><th>Site ID</th><th>サイト名</th><th>件数</th><th>売上合計</th></tr>
      </thead>
      <tbody>
        ${rowsHtml}
        <tr class="total">
          <td colspan="3">合計</td>
          <td class="num">${totalCount}件</td>
          <td class="num">${formatYen(totalSum)}</td>
        </tr>
      </tbody>
    </table>
  `;
  return block;
}

function buildOutputWorkbook(summary, period, label) {
  const wb = XLSX.utils.book_new();

  // サマリーシート
  const summaryRows = [
    [`Site ID 末尾2桁別 売上サマリー（${period || '対象期間'}）${label ? '　' + label : ''}`],
    [],
    ['Site ID 末尾2桁', 'サイト名', '件数', '売上合計(円)', 'Site ID']
  ];
  let totalCount = 0, totalSum = 0;
  for (const s of summary) {
    summaryRows.push([`末尾 ${s.digit}`, s.siteName || '', s.count, s.sum, s.siteId]);
    totalCount += s.count;
    totalSum += s.sum;
  }
  summaryRows.push(['合計', '', totalCount, totalSum, '']);

  const wsSummary = XLSX.utils.aoa_to_sheet(summaryRows);
  wsSummary['!cols'] = [{ wch: 16 }, { wch: 20 }, { wch: 10 }, { wch: 16 }, { wch: 14 }];
  XLSX.utils.book_append_sheet(wb, wsSummary, 'サマリー');

  // 末尾ごとのシート
  for (const s of summary) {
    const detailRows = [
      [`Site ID 末尾「${s.digit}」（${s.siteId} ${s.siteName || ''}）の売上明細`],
      [],
      ['Site ID', 'Credit Card No.', 'Transaction ID', 'Day Time', 'Result', 'Amount(円)']
    ];
    for (const item of s.items) {
      detailRows.push([item.siteId, item.cardNo, item.transactionId, item.dayTime, item.result, item.amount]);
    }
    detailRows.push(['合計', '', '', '', '', s.sum]);

    const ws = XLSX.utils.aoa_to_sheet(detailRows);
    ws['!cols'] = [{ wch: 14 }, { wch: 22 }, { wch: 20 }, { wch: 20 }, { wch: 12 }, { wch: 14 }];
    XLSX.utils.book_append_sheet(wb, ws, `末尾${s.digit}`);
  }

  return wb;
}

runBtn.addEventListener('click', async () => {
  if (uploadedFiles.length === 0) return;

  runBtn.disabled = true;
  runBtn.textContent = '集計中...';
  statusEl.className = 'status';
  resultsContainer.innerHTML = '';
  resultsCard.style.display = 'none';

  const period = periodInput.value.trim();

  try {
    let anyData = false;

    for (const file of uploadedFiles) {
      const buffer = await readFileAsArrayBuffer(file);
      const workbook = XLSX.read(buffer, { type: 'array' });
      const records = parseSales(workbook);

      if (records.length === 0) {
        const warnBlock = document.createElement('div');
        warnBlock.className = 'result-block';
        warnBlock.innerHTML = `<h3>${file.name}</h3><p style="color:var(--text-secondary); font-size:13px;">「売上確定」データが見つかりませんでした。</p>`;
        resultsContainer.appendChild(warnBlock);
        continue;
      }

      anyData = true;
      const summary = summarizeByLast2(records);
      const totalCount = records.length;
      const totalSum = records.reduce((acc, r) => acc + r.amount, 0);

      const tableBlock = renderResultTable(file.name, summary, totalCount, totalSum);

      // ダウンロードボタンを追加
      const actions = document.createElement('div');
      actions.className = 'result-actions';
      const downloadBtn = document.createElement('button');
      downloadBtn.className = 'download';
      downloadBtn.textContent = 'Excelをダウンロード';
      downloadBtn.addEventListener('click', () => {
        const outWb = buildOutputWorkbook(summary, period, file.name.replace(/\.xlsx?$/i, ''));
        const baseName = file.name.replace(/\.xlsx?$/i, '');
        XLSX.writeFile(outWb, `売上_SiteID末尾2桁別_${baseName}.xlsx`);
      });
      actions.appendChild(downloadBtn);
      tableBlock.appendChild(actions);

      resultsContainer.appendChild(tableBlock);
    }

    resultsCard.style.display = 'block';

    if (anyData) {
      showStatus('集計が完了しました。', 'success');
    } else {
      showStatus('「売上確定」データが見つかりませんでした。ファイル形式をご確認ください。', 'error');
    }
  } catch (err) {
    console.error(err);
    showStatus('エラーが発生しました: ' + err.message, 'error');
  } finally {
    runBtn.disabled = false;
    runBtn.textContent = '集計する';
  }
});
</script>
</body>
</html>
